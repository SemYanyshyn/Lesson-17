<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Star Wars Planets</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-dark text-light">
    <div class="container mt-5">
      <h1 class="text-center mb-4">Star Wars Planets</h1>

      <div class="text-center mb-4">
        <button id="planetBtn" class="btn btn-warning">Get Planets</button>
      </div>

      <div
        id="spinner"
        class="spinner-border text-primary d-none"
        role="status"
      >
        <span class="sr-only"></span>
      </div>

      <div class="planets"></div>
    </div>

    <div
      class="modal fade"
      id="planetModal"
      tabindex="-1"
      aria-labelledby="planetModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content bg-dark text-light">
          <div class="modal-header">
            <h5 class="modal-title" id="planetModalLabel">Planet details</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body" id="modalBody">Loading...</div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="01.js"></script>
  </body>
</html>
